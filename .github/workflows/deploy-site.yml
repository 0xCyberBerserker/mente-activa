name: Deploy Site

on:
  workflow_dispatch:
    inputs:
      refresh_release_index:
        description: "Refresh downloads data from GitHub Releases"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: mente-activa-site-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Install site tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq python3

      - name: Refresh release index
        if: ${{ inputs.refresh_release_index }}
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          scripts/release/render-release-index \
            "${GITHUB_REPOSITORY}" \
            docs/release/releases.md \
            site/data/releases.json \
            site/data/releases.md

      - name: Render GitHub Pages site
        run: |
          set -euo pipefail
          scripts/release/render-pages-site \
            site/data/releases.json \
            site/data/releases.md \
            build/pages

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/pages

  deploy-site:
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
